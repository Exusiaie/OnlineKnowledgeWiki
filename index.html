<!DOCTYPE html>
<!--
  文件名：index.html
  描述：Ning 的在线知识库 —— 三层架构渲染器（Renderer Layer）
  架构：Markdown（内容层）→ JSON（索引层）→ HTML（渲染层）
  技术栈：纯原生 HTML5 + CSS3 + 原生 JavaScript + marked.js（Markdown 渲染）
  路由：Hash-based（#/分类/教程名）
  日期：2026-06-25
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ning 的在线知识库</title>

<!-- ============================================================
     marked.js：轻量级 Markdown 解析器（CDN 引入，无框架依赖）
     将 Markdown 文本编译为 HTML，支持 GFM（GitHub Flavored Markdown）
     ============================================================ -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
/* ============================================================
   1. CSS Reset & 设计令牌（CSS Variables）
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* 主色调：绿色系（runoob 风格） */
  --color-primary:       #5FB878;
  --color-primary-dark:  #4a9e63;
  --color-primary-light: #e8f5e9;
  /* 中性色 */
  --color-bg:            #f5f5f5;
  --color-white:         #ffffff;
  --color-text:          #333333;
  --color-text-secondary:#666666;
  --color-text-muted:    #999999;
  --color-border:        #e8e8e8;
  --color-sidebar-bg:    #fafafa;
  --color-sidebar-hover: #e8f5e9;
  --color-sidebar-active:#d4edda;
  /* 布局 */
  --header-height:       52px;
  --sidebar-width:       240px;
  /* 阴影 */
  --shadow-card:         0 1px 3px rgba(0,0,0,.08);
  --shadow-card-hover:   0 6px 18px rgba(0,0,0,.12);
  --shadow-header:       0 2px 8px rgba(0,0,0,.08);
  /* 圆角 */
  --radius-sm:           4px;
  --radius-md:           8px;
  /* 字体 */
  --font-stack:          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                         "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue",
                         Arial, sans-serif;
  /* 过渡 */
  --transition-fast:     0.15s ease;
  --transition-normal:   0.25s ease;
}

html, body { height: 100%; }

body {
  font-family: var(--font-stack);
  font-size: 14px; line-height: 1.6;
  color: var(--color-text);
  background: var(--color-bg);
  -webkit-font-smoothing: antialiased;
}

a { text-decoration: none; color: inherit; }
ul, li { list-style: none; }

/* ============================================================
   2. 顶部导航栏
   ============================================================ */
.top-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  height: var(--header-height);
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  color: var(--color-white);
  display: flex; align-items: center;
  padding: 0 20px;
  box-shadow: var(--shadow-header);
}

/* Logo */
.top-nav .logo {
  flex-shrink: 0; display: flex; align-items: center; gap: 8px;
  font-size: 20px; font-weight: 700; letter-spacing: 1px;
  margin-right: 24px; cursor: pointer; white-space: nowrap;
}
.top-nav .logo .logo-icon {
  width: 32px; height: 32px;
  background: rgba(255,255,255,.25); border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}

/* 汉堡菜单（移动端） */
.top-nav .hamburger {
  display: none; flex-shrink: 0;
  width: 36px; height: 36px;
  background: rgba(255,255,255,.15); border: none;
  border-radius: var(--radius-sm); cursor: pointer;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; margin-right: 12px;
}
.top-nav .hamburger span {
  display: block; width: 18px; height: 2px;
  background: #fff; border-radius: 1px;
  transition: var(--transition-fast);
}

/* 搜索框 */
.top-nav .search-box {
  margin-left: auto; flex-shrink: 0; position: relative;
}
.top-nav .search-box input {
  width: 220px; height: 34px;
  padding: 0 36px 0 14px; border: none; border-radius: 17px;
  background: rgba(255,255,255,.2); color: #fff;
  font-size: 13px; outline: none;
  transition: var(--transition-normal);
}
.top-nav .search-box input::placeholder { color: rgba(255,255,255,.65); }
.top-nav .search-box input:focus {
  background: rgba(255,255,255,.35); width: 260px;
}
.top-nav .search-box .search-icon {
  position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%); font-size: 16px;
  opacity: .8; pointer-events: none;
}

/* 搜索结果下拉 */
.search-results {
  display: none;
  position: absolute; top: 42px; right: 0;
  width: 320px; max-height: 360px; overflow-y: auto;
  background: var(--color-white); border-radius: var(--radius-md);
  box-shadow: 0 8px 24px rgba(0,0,0,.15);
  z-index: 1001;
}
.search-results.show { display: block; }
.search-results .search-item {
  display: block; padding: 10px 16px;
  border-bottom: 1px solid var(--color-border);
  cursor: pointer; transition: var(--transition-fast);
}
.search-results .search-item:hover { background: var(--color-sidebar-hover); }
.search-results .search-item .search-title { font-weight: 600; font-size: 13px; }
.search-results .search-item .search-path {
  font-size: 11px; color: var(--color-text-muted); margin-top: 2px;
}
.search-results .search-empty { padding: 16px; text-align: center; color: var(--color-text-muted); }

/* ============================================================
   3. 主体布局（Grid 两栏）
   ============================================================ */
.main-body {
  display: grid;
  grid-template-columns: var(--sidebar-width) 1fr;
  margin-top: var(--header-height);
  min-height: calc(100vh - var(--header-height));
}

/* ============================================================
   4. 侧边栏
   ============================================================ */
.sidebar {
  background: var(--color-sidebar-bg);
  border-right: 1px solid var(--color-border);
  padding: 8px 0;
  overflow-y: auto;
  position: sticky; top: var(--header-height);
  height: calc(100vh - var(--header-height));
  scrollbar-width: thin; scrollbar-color: #d0d0d0 transparent;
}
.sidebar::-webkit-scrollbar { width: 5px; }
.sidebar::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 3px; }

/* 侧边栏分组 */
.sidebar-group { margin-bottom: 2px; }
.sidebar-group .group-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 16px; cursor: pointer;
  font-size: 14px; font-weight: 600;
  color: var(--color-text);
  transition: var(--transition-fast);
  user-select: none;
}
.sidebar-group .group-header:hover { background: var(--color-sidebar-hover); }
.sidebar-group .group-header .group-label {
  display: flex; align-items: center; gap: 8px;
}
.sidebar-group .group-header .arrow {
  font-size: 10px; transition: transform var(--transition-fast);
  color: var(--color-text-muted);
}
.sidebar-group.collapsed .group-header .arrow { transform: rotate(-90deg); }

/* 分组子项容器 */
.sidebar-group .group-items {
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.sidebar-group.collapsed .group-items { max-height: 0 !important; }
.sidebar-group .group-items a {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px 7px 38px;
  font-size: 13px; color: var(--color-text-secondary);
  transition: var(--transition-fast);
  border-left: 3px solid transparent;
}
.sidebar-group .group-items a:hover {
  background: var(--color-sidebar-hover); color: var(--color-primary-dark);
}
/* 当前激活的侧边栏项 */
.sidebar-group .group-items a.active {
  background: var(--color-sidebar-active); color: var(--color-primary-dark);
  border-left-color: var(--color-primary); font-weight: 500;
}
/* 首页链接 */
.sidebar .sidebar-home {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 16px; font-size: 14px; font-weight: 600;
  color: var(--color-text); cursor: pointer;
  transition: var(--transition-fast); user-select: none;
}
.sidebar .sidebar-home:hover { background: var(--color-sidebar-hover); }
.sidebar .sidebar-home.active {
  background: var(--color-sidebar-active); color: var(--color-primary-dark);
  border-left: 3px solid var(--color-primary);
}

/* 侧边栏遮罩 */
.sidebar-overlay {
  display: none; position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,.35); opacity: 0;
  transition: opacity var(--transition-normal);
}
.sidebar-overlay.show { display: block; opacity: 1; }

/* ============================================================
   5. 主内容区
   ============================================================ */
.content {
  padding: 20px 24px; overflow-y: auto;
}

/* 面包屑 */
.breadcrumb {
  font-size: 12px; color: var(--color-text-muted);
  margin-bottom: 8px;
}
.breadcrumb a { color: var(--color-text-secondary); cursor: pointer; }
.breadcrumb a:hover { color: var(--color-primary); }
.breadcrumb span { color: var(--color-text-muted); }

/* ============================================================
   6. 首页卡片网格
   ============================================================ */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}
.card {
  background: var(--color-white); border-radius: var(--radius-md);
  padding: 20px 16px; box-shadow: var(--shadow-card);
  cursor: pointer; transition: all var(--transition-normal);
  display: flex; flex-direction: column; align-items: center; text-align: center;
  border: 1px solid transparent;
}
.card:hover {
  transform: translateY(-4px); box-shadow: var(--shadow-card-hover);
  border-color: var(--color-primary); color: var(--color-primary-dark);
}
.card .card-icon {
  width: 48px; height: 48px; border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; margin-bottom: 12px; flex-shrink: 0;
}
/* 图标配色变体（8 色） */
.card .card-icon.green  { background: #e8f5e9; color: #4caf50; }
.card .card-icon.blue   { background: #e3f2fd; color: #2196f3; }
.card .card-icon.orange { background: #fff3e0; color: #ff9800; }
.card .card-icon.purple { background: #f3e5f5; color: #9c27b0; }
.card .card-icon.red    { background: #ffebee; color: #f44336; }
.card .card-icon.teal   { background: #e0f2f1; color: #009688; }
.card .card-icon.indigo { background: #e8eaf6; color: #3f51b5; }
.card .card-icon.brown  { background: #efebe9; color: #795548; }

.card .card-title {
  font-size: 15px; font-weight: 600; margin-bottom: 4px;
  color: var(--color-text); transition: var(--transition-fast);
}
.card:hover .card-title { color: var(--color-primary-dark); }
.card .card-desc { font-size: 12px; color: var(--color-text-muted); line-height: 1.4; }

/* ============================================================
   7. Markdown 内容样式（渲染后的文章页面）
   所有样式限定在 .md-content 内，避免污染其他区域
   ============================================================ */
.md-content { max-width: 860px; }

/* 标题层级：使用 runoob 绿色作为视觉锚点 */
.md-content h1 {
  font-size: 26px; font-weight: 700; color: var(--color-text);
  margin-bottom: 16px; padding-bottom: 10px;
  border-bottom: 2px solid var(--color-primary);
}
.md-content h2 {
  font-size: 20px; font-weight: 600; color: var(--color-text);
  margin: 28px 0 12px;
  padding-left: 10px;
  border-left: 3px solid var(--color-primary);
}
.md-content h3 {
  font-size: 16px; font-weight: 600; color: var(--color-text-secondary);
  margin: 20px 0 8px;
}
.md-content p {
  margin-bottom: 12px; line-height: 1.8; color: var(--color-text-secondary);
}
.md-content ul, .md-content ol {
  margin: 8px 0 12px 20px;
}
.md-content li {
  list-style: disc; margin-bottom: 4px;
  color: var(--color-text-secondary); line-height: 1.7;
}
.md-content ol li { list-style: decimal; }

/* 行内代码 */
.md-content code {
  background: #f0f0f0; color: #d63384;
  padding: 2px 6px; border-radius: 3px;
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  font-size: 13px;
}
/* 代码块 */
.md-content pre {
  background: #1e1e1e; color: #d4d4d4;
  padding: 16px 20px; border-radius: var(--radius-md);
  overflow-x: auto; margin: 12px 0 16px;
  line-height: 1.6; font-size: 13px;
}
.md-content pre code {
  background: transparent; color: inherit; padding: 0;
  border-radius: 0; font-size: 13px;
}
/* 表格 */
.md-content table {
  width: 100%; border-collapse: collapse;
  margin: 12px 0 16px; font-size: 13px;
}
.md-content th {
  background: var(--color-primary-light); color: var(--color-text);
  padding: 10px 12px; text-align: left; font-weight: 600;
  border: 1px solid var(--color-border);
}
.md-content td {
  padding: 8px 12px; border: 1px solid var(--color-border);
  color: var(--color-text-secondary);
}
.md-content tr:hover td { background: #fafafa; }
/* 引用块 */
.md-content blockquote {
  border-left: 4px solid var(--color-primary);
  padding: 8px 16px; margin: 12px 0;
  background: var(--color-primary-light);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  color: var(--color-text-secondary);
}
/* 强调 */
.md-content strong { color: var(--color-text); }
.md-content em { color: var(--color-text-secondary); }

/* 空状态 */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--color-text-muted);
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--color-text-secondary); }

/* 加载动画 */
.loading {
  text-align: center; padding: 40px; color: var(--color-text-muted);
}
.loading::after {
  content: "..."; animation: dots 1.5s steps(4, end) infinite;
}
@keyframes dots {
  0%, 20% { content: "."; }
  40% { content: ".."; }
  60%, 100% { content: "..."; }
}

/* ============================================================
   8. 页脚
   ============================================================ */
.page-footer {
  grid-column: 1 / -1; text-align: center;
  padding: 20px; font-size: 12px;
  color: var(--color-text-muted);
  border-top: 1px solid var(--color-border);
  background: var(--color-white);
}
.page-footer a { color: var(--color-primary); }
.page-footer a:hover { text-decoration: underline; }

/* ============================================================
   9. 响应式：中等屏幕（≤1024px）
   ============================================================ */
@media (max-width: 1024px) {
  :root { --sidebar-width: 220px; }
  .card-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }
  .top-nav .search-box input { width: 170px; }
  .top-nav .search-box input:focus { width: 200px; }
}

/* ============================================================
   10. 响应式：小屏幕（≤768px）—— Drawer 模式
   ============================================================ */
@media (max-width: 768px) {
  :root { --sidebar-width: 260px; }
  .top-nav .hamburger { display: flex; }
  .top-nav .search-box input { width: 140px; }
  .top-nav .search-box input:focus { width: 160px; }
  .main-body { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed; top: var(--header-height); left: 0; bottom: 0;
    z-index: 1000; transform: translateX(-100%);
    transition: transform var(--transition-normal);
    box-shadow: 2px 0 12px rgba(0,0,0,.1);
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.show { display: block; }
  .card-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .content { padding: 14px 12px; }
  .card { padding: 14px 10px; }
  .card .card-icon { width: 40px; height: 40px; font-size: 20px; }
}

/* ============================================================
   11. 响应式：超小屏幕（≤480px）
   ============================================================ */
@media (max-width: 480px) {
  .top-nav .logo { font-size: 16px; margin-right: 8px; }
  .top-nav .search-box input { width: 110px; }
  .card-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ==================== 顶部导航栏 ==================== -->
<header class="top-nav">
  <button class="hamburger" id="hamburgerBtn" aria-label="菜单">
    <span></span><span></span><span></span>
  </button>
  <div class="logo" id="logoHome">
    <div class="logo-icon">✎</div>
    <span>Ning 的知识库</span>
  </div>
  <div class="search-box">
    <input type="search" id="searchInput" placeholder="搜索教程..." autocomplete="off">
    <span class="search-icon">🔍</span>
    <!-- 搜索结果下拉（JS 动态填充） -->
    <div class="search-results" id="searchResults"></div>
  </div>
</header>

<!-- ==================== 主体布局 ==================== -->
<div class="main-body">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- 侧边栏：由 JS 根据 index.json 动态构建 -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- 主内容区：由 JS 根据路由动态渲染 -->
  <main class="content" id="mainContent">
    <div class="loading">正在加载知识库索引</div>
  </main>

  <!-- 页脚 -->
  <footer class="page-footer" id="pageFooter">
    © 2026 <a href="#">Ning 的知识库</a> — 学的不仅是技术，更是梦想！
  </footer>
</div>

<!-- ============================================================
     Renderer 核心 JavaScript
     所有渲染逻辑集中于此，按功能分为以下模块：
     1. 全局状态管理
     2. index.json 加载
     3. 路由系统（hash-based）
     4. 侧边栏构建
     5. 首页卡片渲染
     6. Markdown 内容加载与渲染
     7. 搜索系统
     8. 面包屑生成
     9. 移动端交互
     ============================================================ -->
<script>
(function() {
  'use strict';

  /* ==========================================================
     模块 1：全局状态
     ========================================================== */
  var state = {
    index: null,           // 已加载的 index.json 数据
    currentPath: '/',      // 当前路由路径
    isSidebarOpen: false,  // 移动端侧边栏是否展开
    sidebarGroups: []      // 侧边栏分组 DOM 引用（用于折叠控制）
  };

  /* DOM 缓存：避免反复查询 */
  var dom = {
    sidebar:      document.getElementById('sidebar'),
    mainContent:  document.getElementById('mainContent'),
    searchInput:  document.getElementById('searchInput'),
    searchResults:document.getElementById('searchResults'),
    overlay:      document.getElementById('sidebarOverlay'),
    hamburger:    document.getElementById('hamburgerBtn'),
    logo:         document.getElementById('logoHome'),
    footer:       document.getElementById('pageFooter')
  };

  /* ==========================================================
     模块 2：工具函数
     ========================================================== */

  /**
   * 简易 YAML frontmatter 解析器
   * 从 Markdown 文件中提取 --- 包裹的元数据
   * @param {string} raw - 原始 Markdown 文本
   * @returns {{ meta: object, body: string }}
   */
  function parseFrontmatter(raw) {
    var meta = {};
    var body = raw;

    // 匹配开头的 --- ... --- 块
    var match = raw.match(/^---\s*\n([\s\S]*?)\n---\s*\n([\s\S]*)$/);
    if (match) {
      var yamlBlock = match[1];
      body = match[2];

      // 逐行解析简单的 key: value 格式
      yamlBlock.split('\n').forEach(function(line) {
        var kv = line.match(/^\s*(\w+)\s*:\s*(.+?)\s*$/);
        if (kv) {
          var key = kv[1];
          var val = kv[2].trim();

          // 解析数组（如 [tag1, tag2]）
          if (val.startsWith('[') && val.endsWith(']')) {
            val = val.slice(1, -1).split(',').map(function(s) {
              return s.trim().replace(/^['"]|['"]$/g, '');
            });
          }
          // 解析数字
          else if (/^\d+$/.test(val)) {
            val = parseInt(val, 10);
          }
          // 去掉字符串引号
          else {
            val = val.replace(/^['"]|['"]$/g, '');
          }

          meta[key] = val;
        }
      });
    }

    return { meta: meta, body: body };
  }

  /**
   * 构建面包屑数据：根据当前路径生成层级数组
   * 例如 /python/django → [{label:"Python / 数据科学", path:"/python"}, {label:"Django"}]
   * @param {string} path
   * @returns {Array<{label: string, path?: string}>}
   */
  function buildBreadcrumb(path) {
    if (path === '/') { return [{ label: '首页' }]; }

    var parts = path.split('/').filter(Boolean);
    var crumbs = [{ label: '首页', path: '/' }];
    var accumulated = '';

    // 在 index.json 的 nav 树中查找每一级对应的标题
    parts.forEach(function(part) {
      accumulated += '/' + part;
      var label = findNavTitle(accumulated) || part;
      crumbs.push({ label: label, path: accumulated });
    });

    return crumbs;
  }

  /**
   * 在 nav 树中递归查找指定路径对应的标题
   * @param {string} targetPath
   * @returns {string|null}
   */
  function findNavTitle(targetPath) {
    if (!state.index) return null;
    var found = null;

    function search(nodes) {
      if (!nodes) return;
      for (var i = 0; i < nodes.length; i++) {
        var node = nodes[i];
        if (node.path === targetPath) { found = node.title; return; }
        if (node.children) { search(node.children); }
        if (found) return;
      }
    }

    search(state.index.nav);
    return found;
  }

  /**
   * 渲染面包屑 HTML
   * @param {Array} crumbs - buildBreadcrumb 的返回值
   * @returns {string} HTML 字符串
   */
  function renderBreadcrumbHTML(crumbs) {
    return crumbs.map(function(crumb, i) {
      if (i === crumbs.length - 1) {
        // 最后一级：纯文本（非链接）
        return '<span>' + escapeHTML(crumb.label) + '</span>';
      }
      return '<a data-nav="' + crumb.path + '">' + escapeHTML(crumb.label) + '</a>';
    }).join(' &rsaquo; ');
  }

  /**
   * HTML 转义：防止 XSS
   */
  function escapeHTML(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  /**
   * 从路径获取对应的 Markdown 文件路径
   * @param {string} path - 如 /python/django
   * @returns {string|null} - 如 python/django.md
   */
  function getMarkdownFile(path) {
    if (!state.index) return null;

    // 首页
    if (path === '/') { return null; }

    // 递归查找 nav 树中匹配的节点
    var found = null;
    function search(nodes) {
      if (!nodes) return;
      for (var i = 0; i < nodes.length; i++) {
        var node = nodes[i];
        if (node.path === path && node.file) { found = node.file; return; }
        if (node.children) { search(node.children); }
        if (found) return;
      }
    }
    search(state.index.nav);

    // 如果没有精确匹配（如分类首页 /python），尝试加载 index.md
    if (!found) {
      var categoryPath = path.replace(/^\//, '');
      found = categoryPath + '/index.md';
    }

    return found;
  }

  /* ==========================================================
     模块 3：路由系统
     Hash-based 路由：监听 hashchange 事件
     URL 格式：#/分类/子分类
     ========================================================== */

  /**
   * 获取当前 hash 路径
   */
  function getCurrentPath() {
    var hash = window.location.hash;
    if (!hash || hash === '#/' || hash === '#') { return '/'; }
    // 去掉开头的 #
    return hash.replace(/^#/, '');
  }

  /**
   * 导航到指定路径
   * @param {string} path
   */
  function navigateTo(path) {
    if (path !== window.location.hash.replace(/^#/, '') && !(path === '/' && !window.location.hash)) {
      window.location.hash = '#' + path;
    } else {
      // 同一路径，强制刷新
      renderPage(path);
    }
  }

  /**
   * 路由入口：根据路径渲染对应页面
   */
  function renderPage(path) {
    state.currentPath = path;
    dom.mainContent.innerHTML = '<div class="loading">正在加载内容</div>';

    if (path === '/') {
      // 首页：卡片网格
      renderHomePage();
    } else {
      // 内容页：加载 Markdown
      renderContentPage(path);
    }

    // 更新侧边栏高亮
    updateSidebarActive(path);
    // 更新面包屑
    updateBreadcrumb(path);
    // 关闭移动端侧边栏
    closeSidebar();
    // 滚动到顶部
    dom.mainContent.scrollTop = 0;
  }

  /* ==========================================================
     模块 4：Sidebar 动态构建
     完全由 index.json.nav 数据驱动
     ========================================================== */

  /**
   * 根据 index.json 的 nav 数据构建整个侧边栏 HTML
   * @param {Array} navItems - index.json.nav 数组
   */
  function buildSidebar(navItems) {
    var html = '';

    navItems.forEach(function(item) {
      // 如果无 children 且 path 为 /，渲染为首页链接
      if (!item.children && item.path === '/') {
        html += '<a class="sidebar-home" data-nav="/">';
        html += '<span>' + (item.icon || '🏠') + '</span>';
        html += '<span>' + escapeHTML(item.title) + '</span>';
        html += '</a>';
        return;
      }

      // 有 children：渲染为可折叠分组
      if (item.children && item.children.length > 0) {
        html += '<div class="sidebar-group">';
        html += '  <div class="group-header">';
        html += '    <span class="group-label">';
        html += '      <span>' + (item.icon || '📁') + '</span>';
        html += '      <span>' + escapeHTML(item.title) + '</span>';
        html += '    </span>';
        html += '    <span class="arrow">▼</span>';
        html += '  </div>';
        html += '  <div class="group-items">';

        // 按 order 排序子项
        var children = item.children.slice().sort(function(a, b) {
          return (a.order || 0) - (b.order || 0);
        });

        children.forEach(function(child) {
          html += '    <a data-nav="' + child.path + '">';
          html += '<span>' + (child.icon || '📄') + '</span>';
          html += '<span>' + escapeHTML(child.title) + '</span>';
          html += '</a>';
        });

        html += '  </div>';
        html += '</div>';
      }
    });

    dom.sidebar.innerHTML = html;

    // 绑定侧边栏事件
    bindSidebarEvents();
  }

  /**
   * 绑定侧边栏交互事件：
   * - 分组折叠/展开
   * - 导航链接点击（包括首页链接）
   */
  function bindSidebarEvents() {
    // --- 分组折叠/展开 ---
    var groups = dom.sidebar.querySelectorAll('.sidebar-group');
    state.sidebarGroups = [];

    groups.forEach(function(group) {
      var header = group.querySelector('.group-header');
      var items  = group.querySelector('.group-items');

      // 初始化 maxHeight（展开状态）
      items.style.maxHeight = items.scrollHeight + 'px';

      header.addEventListener('click', function() {
        group.classList.toggle('collapsed');
        if (group.classList.contains('collapsed')) {
          items.style.maxHeight = '0px';
        } else {
          items.style.maxHeight = items.scrollHeight + 'px';
        }
      });

      state.sidebarGroups.push({ group: group, items: items });
    });

    // --- 导航链接点击（data-nav 属性标记的所有可点击导航项） ---
    var navLinks = dom.sidebar.querySelectorAll('[data-nav]');
    navLinks.forEach(function(link) {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        var path = link.getAttribute('data-nav');
        navigateTo(path);
      });
    });
  }

  /**
   * 更新侧边栏的 active 高亮状态
   * 同时自动展开包含当前项的折叠分组
   */
  function updateSidebarActive(path) {
    // 移除所有 active
    dom.sidebar.querySelectorAll('.active').forEach(function(el) {
      el.classList.remove('active');
    });

    // 为匹配的导航链接添加 active
    var targetLink = dom.sidebar.querySelector('[data-nav="' + path + '"]');
    if (targetLink) {
      targetLink.classList.add('active');

      // 自动展开包含该链接的折叠分组
      var parentGroup = targetLink.closest('.sidebar-group');
      if (parentGroup && parentGroup.classList.contains('collapsed')) {
        parentGroup.classList.remove('collapsed');
        var items = parentGroup.querySelector('.group-items');
        if (items) {
          items.style.maxHeight = items.scrollHeight + 'px';
        }
      }
    }
  }

  /* ==========================================================
     模块 5：首页渲染（卡片网格）
     ========================================================== */

  function renderHomePage() {
    if (!state.index || !state.index.home || !state.index.home.cards) {
      dom.mainContent.innerHTML = '<div class="empty-state">暂无内容</div>';
      return;
    }

    var cards = state.index.home.cards;
    var html = '';

    // 面包屑（首页无需面包屑，但保留容器以便布局一致）
    html += '<div class="breadcrumb"><span>首页</span></div>';
    html += '<h2 style="font-size:22px;font-weight:600;margin-bottom:20px;">' +
            escapeHTML(state.index.site.title) + '</h2>';
    html += '<div class="card-grid">';

    cards.forEach(function(card) {
      var colorClass = card.color || 'green';
      html += '<div class="card" data-nav="' + card.path + '">';
      html += '  <div class="card-icon ' + colorClass + '">' + (card.icon || '📄') + '</div>';
      html += '  <div class="card-title">' + escapeHTML(card.title) + '</div>';
      html += '  <div class="card-desc">' + escapeHTML(card.desc) + '</div>';
      html += '</div>';
    });

    html += '</div>';
    dom.mainContent.innerHTML = html;

    // 绑定卡片点击事件 → 导航到对应路径
    dom.mainContent.querySelectorAll('.card[data-nav]').forEach(function(card) {
      card.addEventListener('click', function() {
        navigateTo(card.getAttribute('data-nav'));
      });
    });
  }

  /* ==========================================================
     模块 6：Markdown 内容加载与渲染
     ========================================================== */

  function renderContentPage(path) {
    var file = getMarkdownFile(path);
    if (!file) {
      dom.mainContent.innerHTML = '<div class="empty-state">' +
        '<div class="empty-icon">📄</div>' +
        '<h3>页面未找到</h3>' +
        '<p>请检查 URL 路径是否正确</p>' +
        '</div>';
      return;
    }

    // 发起 fetch 请求加载 Markdown 文件
    fetch('content/' + file)
      .then(function(response) {
        if (!response.ok) {
          throw new Error('文件加载失败（HTTP ' + response.status + '）');
        }
        return response.text();
      })
      .then(function(raw) {
        // 解析 frontmatter 与正文
        var parsed = parseFrontmatter(raw);
        var meta = parsed.meta;
        var markdownBody = parsed.body;

        // 使用 marked.js 将 Markdown 转为 HTML
        var htmlContent = '';
        try {
          htmlContent = marked.parse(markdownBody);
        } catch (e) {
          htmlContent = '<p>Markdown 渲染出错：' + escapeHTML(e.message) + '</p>';
        }

        // 组装最终页面：面包屑 + 标题 + 标签 + 正文
        var html = '';

        // 面包屑
        var crumbs = buildBreadcrumb(path);
        html += '<div class="breadcrumb">' + renderBreadcrumbHTML(crumbs) + '</div>';

        // 文章内容容器
        html += '<div class="md-content">' + htmlContent + '</div>';

        // 如果有标签，在文末展示
        if (meta.tags && meta.tags.length > 0) {
          html += '<div style="margin-top:32px;padding-top:16px;border-top:1px solid var(--color-border);">';
          html += '<span style="font-size:12px;color:var(--color-text-muted);">标签：</span>';
          meta.tags.forEach(function(tag) {
            html += '<span style="display:inline-block;margin:2px 4px;padding:2px 10px;' +
                    'background:var(--color-primary-light);color:var(--color-primary-dark);' +
                    'border-radius:12px;font-size:12px;">' + escapeHTML(tag) + '</span>';
          });
          html += '</div>';
        }

        dom.mainContent.innerHTML = html;

        // 重新绑定面包屑中的链接点击事件
        dom.mainContent.querySelectorAll('.breadcrumb a[data-nav]').forEach(function(link) {
          link.addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(link.getAttribute('data-nav'));
          });
        });

        // 高亮侧边栏
        updateSidebarActive(path);
      })
      .catch(function(err) {
        dom.mainContent.innerHTML = '<div class="empty-state">' +
          '<div class="empty-icon">⚠</div>' +
          '<h3>加载失败</h3>' +
          '<p>' + escapeHTML(err.message) + '</p>' +
          '<p style="margin-top:8px;"><a style="color:var(--color-primary);cursor:pointer;" ' +
          'data-nav="/">← 返回首页</a></p>' +
          '</div>';

        // 绑定返回链接
        var backLink = dom.mainContent.querySelector('a[data-nav]');
        if (backLink) {
          backLink.addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo('/');
          });
        }
      });
  }

  /**
   * 更新面包屑（在内容已渲染后调用，或单独更新）
   */
  function updateBreadcrumb(path) {
    var bc = dom.mainContent.querySelector('.breadcrumb');
    if (bc) {
      bc.innerHTML = renderBreadcrumbHTML(buildBreadcrumb(path));
      // 重新绑定事件
      bc.querySelectorAll('a[data-nav]').forEach(function(link) {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          navigateTo(link.getAttribute('data-nav'));
        });
      });
    }
  }

  /* ==========================================================
     模块 7：搜索系统
     搜索范围：index.json 中 nav 的所有节点 + home 的卡片
     搜索逻辑：匹配 title、desc、tags
     ========================================================== */

  /**
   * 构建全局搜索索引（扁平化所有可搜索条目）
   * @returns {Array<{title, path, desc, tags}>}
   */
  function buildSearchIndex() {
    var entries = [];
    if (!state.index) return entries;

    // 从 nav 树中扁平化所有节点
    function flatten(nodes) {
      if (!nodes) return;
      nodes.forEach(function(node) {
        if (node.path && node.path !== '/') {
          entries.push({
            title: node.title,
            path: node.path,
            desc:  node.desc || '',
            tags:  node.tags || [],
            icon:  node.icon || '📄'
          });
        }
        if (node.children) flatten(node.children);
      });
    }
    flatten(state.index.nav);

    // 从 home.cards 补充（去重）
    if (state.index.home && state.index.home.cards) {
      state.index.home.cards.forEach(function(card) {
        var exists = entries.some(function(e) { return e.path === card.path; });
        if (!exists) {
          entries.push({
            title: card.title,
            path:  card.path,
            desc:  card.desc || '',
            tags:  card.tags || [],
            icon:  card.icon || '📄'
          });
        }
      });
    }

    return entries;
  }

  /**
   * 处理搜索输入（防抖在 HTML 中通过 oninput 调用）
   */
  function handleSearch(query) {
    var results = dom.searchResults;
    query = query.trim().toLowerCase();

    if (!query || query.length < 1) {
      results.classList.remove('show');
      results.innerHTML = '';
      return;
    }

    var searchIndex = buildSearchIndex();
    var matched = [];

    searchIndex.forEach(function(entry) {
      var score = 0;
      var titleLower = entry.title.toLowerCase();
      var descLower  = entry.desc.toLowerCase();

      // 标题精确匹配 → 高分
      if (titleLower === query) { score = 100; }
      else if (titleLower.startsWith(query)) { score = 80; }
      else if (titleLower.indexOf(query) !== -1) { score = 60; }
      // 描述匹配
      else if (descLower.indexOf(query) !== -1) { score = 30; }
      // 标签匹配
      else if (entry.tags && entry.tags.some(function(t) {
        return t.toLowerCase().indexOf(query) !== -1;
      })) { score = 20; }

      if (score > 0) {
        matched.push({ entry: entry, score: score });
      }
    });

    // 按分数降序排列
    matched.sort(function(a, b) { return b.score - a.score; });

    // 渲染结果
    if (matched.length === 0) {
      results.innerHTML = '<div class="search-empty">未找到相关内容</div>';
    } else {
      results.innerHTML = matched.slice(0, 12).map(function(m) {
        var e = m.entry;
        return '<div class="search-item" data-nav="' + e.path + '">' +
               '<div class="search-title">' + (e.icon || '📄') + ' ' + escapeHTML(e.title) + '</div>' +
               '<div class="search-path">' + e.path + '</div>' +
               '</div>';
      }).join('');
    }

    results.classList.add('show');

    // 绑定搜索结果点击
    results.querySelectorAll('.search-item').forEach(function(item) {
      item.addEventListener('click', function() {
        navigateTo(item.getAttribute('data-nav'));
        results.classList.remove('show');
        dom.searchInput.value = '';
      });
    });
  }

  // 搜索输入防抖（300ms）
  var searchTimer = null;
  dom.searchInput.addEventListener('input', function() {
    clearTimeout(searchTimer);
    var query = dom.searchInput.value;
    searchTimer = setTimeout(function() { handleSearch(query); }, 300);
  });

  // 点击页面其他地方关闭搜索结果
  document.addEventListener('click', function(e) {
    if (!dom.searchInput.contains(e.target) && !dom.searchResults.contains(e.target)) {
      dom.searchResults.classList.remove('show');
    }
  });

  // Escape 关闭搜索结果
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      dom.searchResults.classList.remove('show');
      dom.searchInput.blur();
    }
  });

  /* ==========================================================
     模块 8：移动端侧边栏交互
     ========================================================== */

  function openSidebar() {
    dom.sidebar.classList.add('open');
    dom.overlay.classList.add('show');
    document.body.style.overflow = 'hidden';
    state.isSidebarOpen = true;
  }

  function closeSidebar() {
    dom.sidebar.classList.remove('open');
    dom.overlay.classList.remove('show');
    document.body.style.overflow = '';
    state.isSidebarOpen = false;
  }

  // 汉堡菜单按钮
  dom.hamburger.addEventListener('click', function() {
    if (state.isSidebarOpen) { closeSidebar(); }
    else { openSidebar(); }
  });

  // 点击遮罩关闭
  dom.overlay.addEventListener('click', closeSidebar);

  // Escape 关闭
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && state.isSidebarOpen) {
      closeSidebar();
    }
  });

  // 窗口变宽时自动关闭
  window.addEventListener('resize', function() {
    if (window.innerWidth > 768 && state.isSidebarOpen) {
      closeSidebar();
    }
  });

  /* ==========================================================
     模块 9：Logo 点击回到首页
     ========================================================== */
  dom.logo.addEventListener('click', function() { navigateTo('/'); });

  // 全局委托：页面中所有 [data-nav] 元素点击时导航（处理动态生成的内容）
  document.addEventListener('click', function(e) {
    var navTarget = e.target.closest('[data-nav]');
    if (navTarget && !dom.sidebar.contains(navTarget)) {
      e.preventDefault();
      var path = navTarget.getAttribute('data-nav');
      if (path !== state.currentPath) {
        navigateTo(path);
      }
    }
  });

  /* ==========================================================
     模块 10：应用初始化
     ========================================================== */

  /**
   * 启动应用：
   * 1. 加载 index.json
   * 2. 配置 marked.js
   * 3. 构建侧边栏
   * 4. 监听 hash 变化
   * 5. 渲染当前页面
   */
  function init() {
    // 配置 marked.js（安全渲染，允许常见 HTML 标签）
    if (typeof marked !== 'undefined') {
      marked.setOptions({
        breaks: true,       // 换行符转为 <br>
        gfm: true,          // GitHub Flavored Markdown
        sanitize: false     // marked 新版已废弃 sanitize，使用默认安全渲染
      });
    }

    // 加载 index.json
    fetch('index.json')
      .then(function(response) {
        if (!response.ok) {
          throw new Error('index.json 加载失败，请确认文件存在');
        }
        return response.json();
      })
      .then(function(data) {
        // 存储索引数据到全局状态
        state.index = data;

        // 更新页面 title
        if (data.site && data.site.title) {
          document.title = data.site.title;
        }

        // 更新页脚
        if (data.site && data.site.footer) {
          dom.footer.innerHTML = data.site.footer;
        }

        // 构建侧边栏
        buildSidebar(data.nav);

        // 监听 hash 变化
        window.addEventListener('hashchange', function() {
          renderPage(getCurrentPath());
        });

        // 初始渲染
        renderPage(getCurrentPath());
      })
      .catch(function(err) {
        // 加载失败：显示错误提示
        dom.mainContent.innerHTML =
          '<div class="empty-state">' +
          '<div class="empty-icon">🔌</div>' +
          '<h3>知识库加载失败</h3>' +
          '<p>' + escapeHTML(err.message) + '</p>' +
          '<p style="margin-top:12px;font-size:12px;color:var(--color-text-muted);">' +
          '请确保 index.json 和 content/ 目录与此页面在同一目录下</p>' +
          '</div>';
        console.error('[Renderer] 初始化失败:', err);
      });
  }

  // 启动！
  init();

})();
</script>

</body>
</html>
